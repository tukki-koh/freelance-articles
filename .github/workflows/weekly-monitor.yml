name: 週次自動運用（ニュース監視・記事公開・X投稿・SEO改善・note投稿）

on:
  schedule:
    # 月曜 朝8時 JST（ニュース監視 → 記事生成 → Vercel公開 → X投稿）
    - cron: '0 23 * * 0'
    # 火曜 朝8時 JST（既存記事をnoteに週1本投稿）
    - cron: '0 23 * * 1'
    # 水曜 朝9時 JST（既存記事をXに週1本投稿）
    - cron: '0 0 * * 3'
    # 木曜 朝7時 JST（SEO監視 → 低順位記事を自動改善）
    - cron: '0 22 * * 3'
    # 土曜 朝9時 JST（クオリティ基準記事を自動生成・公開）
    - cron: '0 0 * * 6'

  # 手動実行（テスト用）
  workflow_dispatch:
    inputs:
      job:
        description: '実行するジョブ'
        required: true
        default: 'monitor'
        type: choice
        options:
          - monitor        # ニュース監視 → 記事生成 → X投稿
          - post           # 既存記事をXに投稿
          - seo            # SEO監視 → 低順位記事を自動改善
          - note           # 既存記事をnoteに投稿
          - quality-article # クオリティ基準記事を生成・公開

jobs:
  # ================================================================
  # JOB 1: ニュース監視 → Claude記事生成 → 自動公開 → X投稿
  # 毎週月曜 朝8時
  # ================================================================
  news-monitor:
    name: ニュース監視・記事自動生成
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'monitor' ||
      github.event_name == 'schedule' && github.event.schedule == '0 23 * * 0'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Playwrightブラウザをインストール
        run: npx playwright install chromium --with-deps

      - name: ニュース監視 → 記事生成 → X投稿 → note投稿
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: node scripts/generate-draft.mjs

      - name: 実行結果
        if: always()
        run: |
          echo "## 月曜自動実行 結果" >> $GITHUB_STEP_SUMMARY
          echo "実行日時: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')" >> $GITHUB_STEP_SUMMARY

  # ================================================================
  # JOB 2: 既存10記事をXに週1本ずつ投稿
  # 毎週水曜 朝9時
  # ================================================================
  scheduled-post:
    name: 既存記事のX定期投稿
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'post' ||
      github.event_name == 'schedule' && github.event.schedule == '0 0 * * 3'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: 既存記事をXに投稿
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node scripts/post-scheduled.mjs

      - name: 投稿状態を保存
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: X投稿状態を更新'
          file_pattern: 'scripts/.post-queue-state.json'

      - name: 実行結果
        if: always()
        run: |
          echo "## 水曜X投稿 結果" >> $GITHUB_STEP_SUMMARY
          echo "実行日時: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')" >> $GITHUB_STEP_SUMMARY

  # ================================================================
  # JOB 3: SEO監視 → 低順位記事を自動リライト
  # 毎週木曜 朝7時 JST
  # ================================================================
  seo-improve:
    name: SEO監視・低順位記事自動改善
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'seo' ||
      github.event_name == 'schedule' && github.event.schedule == '0 22 * * 3'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: SEO監視 → 低順位記事を改善
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/seo-monitor.mjs

      - name: 実行結果
        if: always()
        run: |
          echo "## 木曜SEO改善 結果" >> $GITHUB_STEP_SUMMARY
          echo "実行日時: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')" >> $GITHUB_STEP_SUMMARY

  # ================================================================
  # JOB 4: 既存記事をnoteに週1本ずつ投稿
  # 毎週火曜 朝8時 JST
  # ================================================================
  note-post:
    name: note定期投稿
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'note' ||
      github.event_name == 'schedule' && github.event.schedule == '0 23 * * 1'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Playwrightブラウザをインストール
        run: npx playwright install chromium --with-deps

      - name: 既存記事をnoteに投稿
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: node scripts/note-scheduled.mjs

      - name: 投稿状態を保存
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: note投稿状態を更新'
          file_pattern: 'scripts/.note-queue-state.json'

      - name: 実行結果
        if: always()
        run: |
          echo "## 火曜note投稿 結果" >> $GITHUB_STEP_SUMMARY
          echo "実行日時: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')" >> $GITHUB_STEP_SUMMARY

  # ================================================================
  # JOB 5: クオリティ基準準拠の記事を自動生成・公開
  # 毎週土曜 朝9時 JST
  # ================================================================
  quality-article:
    name: クオリティ記事自動生成・公開
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'quality-article' ||
      github.event_name == 'schedule' && github.event.schedule == '0 0 * * 6'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: クオリティ基準記事を生成してGitHubにコミット
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-quality-article.mjs

      - name: 実行結果
        if: always()
        run: |
          echo "## 土曜クオリティ記事生成 結果" >> $GITHUB_STEP_SUMMARY
          echo "実行日時: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')" >> $GITHUB_STEP_SUMMARY
