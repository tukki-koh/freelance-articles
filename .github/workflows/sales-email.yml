name: 営業メール自動生成（毎週火曜 10時）

on:
  # 毎週火曜 10:00 JST（= UTC 01:00）
  schedule:
    - cron: '0 1 * * 2'

  # 手動実行（テスト用）
  workflow_dispatch:
    inputs:
      type:
        description: '送信タイプ'
        required: true
        default: 'both'
        type: choice
        options:
          - both   # B2B + B2C 両方
          - b2b    # 企業向けのみ
          - b2c    # 個人向けのみ

jobs:
  send-sales-emails:
    name: 営業メール下書き生成
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: 営業メールをMarkdownファイルに生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-sales-emails.mjs --type ${{ github.event.inputs.type || 'both' }}

      - name: 生成したメールをリポジトリに保存
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: 営業メール下書きを生成'
          file_pattern: 'sales/drafts/*.md'

      - name: 実行結果
        if: always()
        run: |
          echo "## 📧 営業メール自動生成 完了" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "実行日時: $(TZ=Asia/Tokyo date '+%Y年%m月%d日 %H:%M JST')" >> $GITHUB_STEP_SUMMARY
          echo "タイプ: ${{ github.event.inputs.type || 'both（自動）' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📂 リポジトリの sales/drafts/ フォルダを確認してください" >> $GITHUB_STEP_SUMMARY
