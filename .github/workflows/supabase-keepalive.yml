name: Supabase 停止防止（2日ごと）

on:
  schedule:
    # 2日ごと 朝9時 JST（= UTC 00:00）※7日停止ルールに対して十分な余裕
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  keepalive:
    name: Supabase 生存確認
    runs-on: ubuntu-latest

    steps:
      - name: Supabase にアクセスして停止を防ぐ
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ NEXT_PUBLIC_SUPABASE_URL または NEXT_PUBLIC_SUPABASE_ANON_KEY が未設定です"
            echo "GitHub Secrets に追加してください → Settings > Secrets > Actions"
            exit 1
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            --max-time 15 || echo "000")
          echo "Supabase レスポンス: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "✅ Supabase は正常に動作しています（停止防止済み）"
          else
            echo "❌ Supabase への接続に失敗しました (HTTP $STATUS)"
            echo "プロジェクトが停止している可能性があります"
            echo "https://supabase.com/dashboard で確認・復元してください"
            exit 1
          fi

      - name: 結果をサマリーに表示
        if: always()
        run: |
          echo "## 🟢 Supabase 生存確認" >> $GITHUB_STEP_SUMMARY
          echo "実行日時: $(TZ=Asia/Tokyo date '+%Y年%m月%d日 %H:%M JST')" >> $GITHUB_STEP_SUMMARY
